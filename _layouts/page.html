---
layout: default
---

<article class="page">
  <div class="container-narrow">
    <header class="page__header">
      <h1 class="page__title">{{ page.title | escape }}</h1>
      {% if page.subtitle %}<p class="page__lede">{{ page.subtitle | escape }}</p>{% endif %}
    </header>

    <div class="page__body">
      {{ content }}
    </div>
  </div>
</article>
