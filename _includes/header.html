<header class="site-header" role="banner">
  <div class="container site-header__inner">
    <a class="site-header__brand" href="{{ '/' | relative_url }}" aria-label="Notebook Intelligence — home">
      <svg width="22" height="22" viewBox="0 0 22 22" aria-hidden="true">
        <rect x="1" y="1" width="20" height="20" rx="5" fill="currentColor" />
        <path d="M6 7h2.2l4.6 6.4V7H15v8h-2.2L8.2 8.6V15H6V7z" fill="var(--bg)" />
      </svg>
      <span>Notebook Intelligence</span>
    </a>

    <nav class="site-header__nav" aria-label="Primary">
      <a href="{{ '/features/' | relative_url }}"{% if page.url contains '/features/' %} aria-current="page"{% endif %}>Features</a>
      <a href="{{ '/install/' | relative_url }}"{% if page.url == '/install/' %} aria-current="page"{% endif %}>Install</a>
      <a href="{{ '/providers/' | relative_url }}"{% if page.url == '/providers/' %} aria-current="page"{% endif %}>Providers</a>
      <a href="{{ '/admin/' | relative_url }}"{% if page.url == '/admin/' %} aria-current="page"{% endif %}>Admin</a>
      <a href="{{ '/blog/' | relative_url }}"{% if page.url contains '/blog/' %} aria-current="page"{% endif %}>Blog</a>
    </nav>

    <div class="site-header__actions">
      {% include theme-toggle.html %}
