title: Notebook Intelligence
description: >-
  A JupyterLab extension for Claude Code, GitHub Copilot, Ollama, and
  OpenAI-compatible models — with MCP, Skills, Plugins, and admin policy.
url: https://notebook-intelligence.github.io
baseurl: /notebook-intelligence
domain: notebook-intelligence.github.io

# Personal social signals; mirrored by jekyll-seo-tag into Twitter cards.
twitter_username: mbektash
github_username: mbektas

author:
  name: Mehmet Bektaş
  twitter: mbektash

# Structured-data social block consumed by jekyll-seo-tag.
social:
  name: Notebook Intelligence
  links:
    - https://github.com/notebook-intelligence/notebook-intelligence
    - https://twitter.com/mbektash

# Default Open Graph image. Per-post overrides via front-matter `image:`.
logo: /assets/og/og-default.png
image: /assets/og/og-default.png

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-redirect-from

permalink: /blog/:slug/
future: true

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: pages
    values:
      layout: page

markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: false

sass:
  style: compressed
  sass_dir: _sass

# Files / directories left in the working tree by other branches. Excluded
# from the Jekyll build so the gh-pages site stays focused.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
  - .venv/
  - lib/
  - tests/
  - notebook_intelligence/
  - .playwright-mcp/
  - .pytest_cache/
  - .yarn/
  - .ipynb_checkpoints/
  - .eslintcache
  - .stylelintcache
  - tsconfig.tsbuildinfo
  - "*.ipynb"
  # Root-level screenshot artifacts checked out from other branches.
  - "a11y-final-state.png"
  - "chat-picker-popover.png"
  - "chat-sayhi.png"
  - "chat-sidebar.png"
  - "chat-test.png"
  - "clean-167-test.png"
  - "current-state.png"
  - "debug-popover.png"
  - "fibonacci-result.png"
  - "final.png"
  - "fresh-jupyter-test.png"
  - "generate-done.png"
  - "generate-fired.png"
  - "issue182-step1-in-subdir.png"
  - "issue182-step2-filebrowser.png"
  - "issue182-step3-new-session.png"
  - "jl-initial.png"
  - "jupyterlab-main.png"
  - "launcher-after-arrows.png"
  - "launcher-after-enter.png"
  - "launcher-after-rebuild.png"
  - "launcher-after-restart.png"
  - "launcher-full.png"
  - "launcher-picker-open.png"
  - "launcher-with-claude-tile.png"
  - "popover-fixed.png"
  - "popover-open.png"
  - "popover-typed.png"
  - "pr170-toolbar-left.png"
